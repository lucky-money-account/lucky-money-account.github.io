<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能对象识别系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="3"/>
                    <line x1="12" y1="2" x2="12" y2="6"/>
                    <line x1="12" y1="18" x2="12" y2="22"/>
                    <line x1="2" y1="12" x2="6" y2="12"/>
                    <line x1="18" y1="12" x2="22" y2="12"/>
                </svg>
                <h1>智能对象识别</h1>
            </div>
            <p class="subtitle">基于深度学习的多模式目标识别系统</p>
        </header>

        <div class="main-card">
            <section class="mode-section">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    选择识别模式
                </h2>
                <div class="mode-grid" id="modeGrid">
                    <div class="mode-card loading">
                        <div class="mode-card-shimmer"></div>
                    </div>
                    <div class="mode-card loading">
                        <div class="mode-card-shimmer"></div>
                    </div>
                    <div class="mode-card loading">
                        <div class="mode-card-shimmer"></div>
                    </div>
                    <div class="mode-card loading">
                        <div class="mode-card-shimmer"></div>
                    </div>
                </div>
            </section>

            <section class="upload-section">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    上传图片
                </h2>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept="image/*" hidden>
                    <div class="upload-content">
                        <div class="upload-icon">
                            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                        </div>
                        <p class="upload-text">拖拽图片到此处，或<span class="upload-link">点击上传</span></p>
                        <p class="upload-hint">支持 JPG、PNG、GIF、BMP、WebP 格式</p>
                    </div>
                </div>
                <div class="preview-area hidden" id="previewArea">
                    <div class="preview-image-wrapper">
                        <img id="previewImage" src="" alt="预览">
                        <button class="preview-remove" id="removeImage" title="移除图片">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                    <button class="btn-analyze" id="analyzeBtn">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                            <polyline points="17 6 23 6 23 12"/>
                        </svg>
                        <span>开始识别</span>
                    </button>
                </div>
            </section>

            <section class="result-section hidden" id="resultSection">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                    识别结果
                </h2>
                <div class="result-spinner" id="resultSpinner">
                    <div class="spinner"></div>
                    <p>正在分析中...</p>
                </div>
                <div class="result-content" id="resultContent">
                    <div class="top-result" id="topResult"></div>
                    <div class="result-list" id="resultList"></div>
                </div>
                <div class="result-action">
                    <button class="btn-reset" id="resetBtn">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
                        </svg>
                        重新识别
                    </button>
                </div>
            </section>
        </div>

        <footer class="footer">
            <p>Powered by TensorFlow + MobileNetV2 | Flask Backend</p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
